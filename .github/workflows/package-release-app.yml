name: Package Release App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, for example v1.2.0"
        required: true
        type: string
      launch_smoke_test:
        description: "Launch the app.zip and pkg payload during release verification"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Build macOS release assets
    runs-on: macos-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build and verify release assets
        env:
          SPARKLE_ED_KEY: ${{ secrets.SPARKLE_ED_KEY }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          if [[ -z "${SPARKLE_ED_KEY:-}" ]]; then
            echo "SPARKLE_ED_KEY is not configured; building unsigned Sparkle metadata preview assets."
            export SKIP_SPARKLE_SIGNING=1
            export REQUIRE_SPARKLE_SIGNATURES=0
          fi
          if [[ "${{ inputs.launch_smoke_test }}" == "true" ]]; then
            export RUN_LAUNCH_SMOKE_TEST=1
          fi
          VERSION="$VERSION" ./script/build_release_assets.sh

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          ARTIFACT_DIR="$GITHUB_WORKSPACE/dist/release-v$VERSION/artifacts"
          assets=(
            "$ARTIFACT_DIR/Surge-Relay-$VERSION.app.zip"
            "$ARTIFACT_DIR/Surge-Relay-$VERSION.app.zip.sha256"
            "$ARTIFACT_DIR/Surge-Relay-$VERSION.pkg"
            "$ARTIFACT_DIR/Surge-Relay-$VERSION.pkg.sha256"
          )
          for signed_metadata in \
            "$ARTIFACT_DIR/Surge-Relay-$VERSION.app.zip.sparkle.txt" \
            "$ARTIFACT_DIR/Surge-Relay-$VERSION.pkg.sparkle.txt"
          do
            [[ -f "$signed_metadata" ]] && assets+=("$signed_metadata")
          done
          if ! gh release view "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "${{ inputs.tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Surge Relay $VERSION" \
              --notes "Release assets generated by GitHub Actions."
          fi
          gh release upload "${{ inputs.tag }}" \
            "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Verify uploaded GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          verify_args=(
            --tag "${{ inputs.tag }}"
            --repo "$GITHUB_REPOSITORY"
          )
          if [[ "${{ inputs.launch_smoke_test }}" == "true" ]]; then
            verify_args+=(--launch-smoke-test)
          fi
          VERSION="$VERSION" ./script/verify_github_release_assets.sh "${verify_args[@]}"
